<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EcoRuta - Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div class="card-dark" style="width: 100%; max-width: 400px; text-align: center;">
        <h2>Iniciar Sesión</h2>
        <p style="color: #888; margin-bottom: 20px;">Panel de Acceso EcoRuta</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-messages">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group" style="text-align: left;">
                <label>Usuario o Correo</label>
                <input type="text" name="username" required placeholder="admin@ecoruta.gob.mx">
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-eco" style="width: 100%; margin-top: 10px;">Acceder al Sistema</button>
        </form>
        <br>
        <a href="/" style="color: #888; text-decoration: none; font-size: 14px;">← Volver al Inicio</a>
    </div>
</body>
</html>
